# ============================================================
# Конфигурация для автотестов Яндекс.Диска
# ============================================================

# OAuth-токен для доступа к API Яндекс.Диска.
# ВАЖНО: Замените значение YOUR_OAUTH_TOKEN_HERE на ваш реальный OAuth-токен.
#
# Как получить токен:
# 1. Перейдите на https://oauth.yandex.ru/
# 2. Зарегистрируйте приложение (или используйте существующее)
# 3. Укажите права доступа: cloud_api:disk.app_folder, cloud_api:disk.read, cloud_api:disk.write, cloud_api:disk.info
# 4. Получите токен через OAuth-авторизацию
#
# Также можно использовать "полигон" для быстрого получения токена:
# https://yandex.ru/dev/disk/poligon/

oauth.token=YOUR_OAUTH_TOKEN_HERE
